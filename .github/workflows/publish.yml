name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      # Node 22 ships npm 10.x which does not support the OIDC handshake.
      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Build C++ test runner
        run: make -C tests/cpp

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # setup-node with registry-url sets NODE_AUTH_TOKEN to a placeholder,
      # which prevents npm from using OIDC. Clear it so OIDC takes over.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""
